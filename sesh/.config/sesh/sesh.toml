[default_session]
startup_command = "nvim -c ':FzfLua files'"
preview_command = "eza --all --git --icons --color=always {}"

[[session]]
name = "tmux config"
path = "~/personal/dotfiles/tmux/.config/tmux"
startup_command = "nvim tmux.conf"
preview_command = "bat --color=always ~/personal/dotfiles/tmux/.config/tmux/tmux.conf"
windows = [ "git" ]

[[window]]
name = "git"
startup_script = "lazygit"
